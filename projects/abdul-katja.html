<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROJEKT 01 — Abdul & Katja | Objektiv Kritique</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">
<style>
  body {
    background: #0a0a0a;
    color: #e8e4df;
  }
  .teaser-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    text-align: center;
    padding: 40px 0;
  }

  .cover-art {
    width: 100%;
    max-width: 480px;
    aspect-ratio: 1 / 1;
    margin: 0 auto 40px;
    border: 1px solid var(--border);
  }

  .cover-art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .teaser-title {
    font-family: 'Space Mono', monospace;
    font-size: clamp(24px, 6vw, 36px);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 16px;
    color: var(--text);
  }

  .teaser-subtitle {
    font-size: 20px;
    font-weight: 300;
    color: var(--text-dim);
    margin-bottom: 32px;
    font-style: italic;
    max-width: 480px;
    line-height: 1.6;
  }

  .teaser-date {
    font-family: 'Space Mono', monospace;
    font-size: clamp(32px, 8vw, 56px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
    margin-bottom: 12px;
  }

  .teaser-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 48px;
  }

  .teaser-back {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 14px 28px;
    transition: all 0.3s ease;
  }

  .teaser-back:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>
<div class="container narrow">
  <header class="site-header">
    <a href="../index.html" class="brand">Objektiv Kritique</a>
    <nav class="nav"><a href="../index.html#projekter">Arkiv</a><a href="../index.html#kontakt">Kontakt</a></nav>
  </header>

  <main>
    <div class="teaser-page">
      <div class="cover-art">
        <img src="../assets/abdul/abdulcover.jpg" alt="Abdul 2026 — Cover">
      </div>

      <div class="teaser-title">Abdul & Katja</div>

      <p class="teaser-subtitle">En satirisk musikvideo om identitet, social kontrol og dobbeltmoral. 20 års jubilæum.</p>

      <div class="teaser-date">12. JUNI</div>
      <div class="teaser-label">Premiere 2026</div>

      <a href="../index.html" class="teaser-back">← Tilbage</a>
    </div>
  </main>

  <footer class="site-footer"><p class="footer-text">OBJEKTIV KRITIQUE</p></footer>
</div>
</body>
</html>
